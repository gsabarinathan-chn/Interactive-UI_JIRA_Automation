<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestForge AI — JIRA to Playwright</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg: #080c10; --bg2: #0d1117; --bg3: #111820;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
      --text: #e8edf3; --text-muted: #6b7a8a; --text-dim: #3d4d5c;
      --accent: #00d4aa; --accent2: #0099ff; --accent3: #7c3aed;
      --red: #ef4444; --yellow: #f59e0b; --green: #22c55e;
      --card-bg: #0d1117; --card-border: rgba(255,255,255,0.06);
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px); background-size: 40px 40px; }
    .header { position: relative; z-index: 10; border-bottom: 1px solid var(--border); background: rgba(8,12,16,0.9); backdrop-filter: blur(12px); }
    .header-inner { max-width: 1000px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 24px rgba(0,212,170,0.3); }
    .logo h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .logo-ai { color: var(--accent); }
    .logo p { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .main { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 32px 24px 80px; }
    .steps { display: flex; align-items: center; margin-bottom: 32px; padding: 20px 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); flex-wrap: wrap; gap: 4px; }
    .step { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 8px; min-width: 16px; transition: background 0.3s; }
    .step-line.done { background: var(--accent); }
    .step-circle { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-muted); transition: all 0.3s; }
    .step.active .step-circle { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px rgba(0,212,170,0.3); }
    .step.done .step-circle { background: var(--accent); border-color: var(--accent); color: #000; }
    .step-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .step.active .step-label { color: var(--accent); }
    .step.done .step-label { color: var(--text); }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .card-header { margin-bottom: 24px; }
    .card-header h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .card-header p { color: var(--text-muted); font-size: 13px; }
    .card-header.between { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .card-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } }
    .form-section { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; }
    .section-title { display: flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
    .field input::placeholder { color: var(--text-dim); }
    .field-hint { display: block; font-size: 11px; color: var(--text-muted); margin-top: 5px; }
    .field-hint a { color: var(--accent2); text-decoration: none; }
    .ai-info { display: flex; gap: 12px; padding: 14px; background: rgba(0,212,170,0.05); border: 1px solid rgba(0,212,170,0.15); border-radius: var(--radius-sm); margin: 16px 0; }
    .ai-info strong { display: block; font-size: 13px; color: var(--text); margin-bottom: 4px; }
    .ai-info p { font-size: 12px; color: var(--text-muted); }
    .pipeline-viz { display: flex; align-items: center; gap: 8px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .pipe-step { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center; font-size: 12px; color: var(--text-muted); padding: 6px; }
    .pipe-arrow { color: var(--accent); font-size: 16px; font-weight: bold; }
    .btn-primary { padding: 10px 20px; background: linear-gradient(135deg, var(--accent), #00b894); color: #000; font-weight: 700; font-size: 13px; border: none; border-radius: var(--radius-sm); cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; letter-spacing: 0.3px; transition: all 0.2s; box-shadow: 0 4px 16px rgba(0,212,170,0.25); }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,170,0.35); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-ghost { padding: 10px 16px; background: transparent; color: var(--text-muted); font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Inter', sans-serif; }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .spinner { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 48px; color: var(--text-muted); }
    .loading-orb { width: 48px; height: 48px; border-radius: 50%; background: radial-gradient(circle at center, var(--accent), transparent); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
    .error-box { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-sm); color: #fca5a5; font-size: 13px; margin-bottom: 16px; }
    .error-box.mt { margin-top: 16px; }
    .story-card { border-color: rgba(0,212,170,0.15); }
    .story-header-inner { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .issue-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,153,255,0.1); color: var(--accent2); border: 1px solid rgba(0,153,255,0.2); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); text-transform: uppercase; letter-spacing: 0.5px; }
    .priority-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(245,158,11,0.1); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
    .story-description { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .story-description label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .story-description p { color: var(--text); font-size: 13px; line-height: 1.7; }
    .issue-preview { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .issue-key-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,153,255,0.15); color: var(--accent2); padding: 8px 16px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; }
    .issue-endpoint { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; word-break: break-all; }
    .tc-grid { display: flex; flex-direction: column; gap: 10px; }
    .tc-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; transition: border-color 0.2s; }
    .tc-card:hover, .tc-card.open { border-color: var(--border-hover); }
    .tc-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
    .tc-meta { display: flex; gap: 6px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
    .tc-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--text-muted); background: var(--bg); padding: 2px 7px; border-radius: 4px; }
    .tc-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .tc-title { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
    .tc-chevron { color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
    .tc-chevron.rotated { transform: rotate(180deg); }
    .tc-body { padding: 14px 16px 16px; border-top: 1px solid var(--border); }
    .tc-section { margin-bottom: 12px; }
    .tc-section label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .tc-section p { font-size: 13px; color: var(--text); }
    .tc-steps-list { padding-left: 20px; }
    .tc-steps-list li { font-size: 13px; color: var(--text); margin-bottom: 4px; }
    .expected { color: var(--green) !important; }
    .tc-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .tag { padding: 2px 8px; background: rgba(124,58,237,0.1); color: #a78bfa; border: 1px solid rgba(124,58,237,0.2); border-radius: 4px; font-size: 11px; }
    .code-wrapper { background: #060a0e; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .code-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); }
    .code-lang { font-size: 11px; color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .code-file { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .code-block { padding: 20px; overflow-x: auto; max-height: 550px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; color: #a8b8c8; white-space: pre; }
    .install-guide h3 { font-family: 'Syne', sans-serif; font-size: 16px; margin-bottom: 14px; }
    .code-snippet { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 8px; }
    .code-snippet code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }
    .footer { position: relative; z-index: 1; text-align: center; padding: 24px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 12px; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeSlideIn 0.4s ease forwards; }
    svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    // ── Replace this with your Render backend URL after deploying ──
    const API_BASE = 'https://interactive-ui-jira-automation.onrender.com';

    // ── Icons ──────────────────────────────────────────────────────
    const icons = {
      jira: <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M11.571 11.513H0a5.218 5.218 0 0 0 5.232 5.215h2.13v2.057A5.215 5.215 0 0 0 12.575 24V12.518a1.005 1.005 0 0 0-1.005-1.005zm5.723-5.756H5.736a5.215 5.215 0 0 0 5.215 5.214h2.129v2.058a5.218 5.218 0 0 0 5.215 5.214V6.762a1.005 1.005 0 0 0-1.001-1.005zM23.013 0H11.455a5.215 5.215 0 0 0 5.215 5.215h2.129v2.057A5.215 5.215 0 0 0 24 12.483V1.005A1.001 1.001 0 0 0 23.013 0z"/></svg>,
      sparkles: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/></svg>,
      code: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"/></svg>,
      check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>,
      copy: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75"/></svg>,
      download: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>,
      eye: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
      chevron: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>,
      alert: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>,
    };
    const Icon = ({ name }) => icons[name] || null;

    // ── Steps ──────────────────────────────────────────────────────
    function Steps({ current }) {
      const steps = [
        { id: 1, label: 'Configure' },
        { id: 2, label: 'Fetch Story' },
        { id: 3, label: 'Test Cases' },
        { id: 4, label: 'Playwright' },
      ];
      const TOTAL = steps.length;
      return (
        <div className="steps">
          {steps.map((s, i) => {
            const isDone = current > s.id || (current === TOTAL && s.id === TOTAL);
            const isActive = current === s.id && s.id !== TOTAL;
            return (
              <React.Fragment key={s.id}>
                <div className={`step ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`}>
                  <div className="step-circle">
                    {isDone ? <Icon name="check" /> : <span>{s.id}</span>}
                  </div>
                  <span className="step-label">{s.label}</span>
                </div>
                {i < steps.length - 1 && <div className={`step-line ${current >= s.id + 1 ? 'done' : ''}`} />}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    // ── Test Case Card ─────────────────────────────────────────────
    function TestCaseCard({ tc }) {
      const [open, setOpen] = useState(false);
      const typeColors = { positive: ['rgba(34,197,94,0.12)', '#22c55e', 'rgba(34,197,94,0.2)'], negative: ['rgba(239,68,68,0.12)', '#ef4444', 'rgba(239,68,68,0.2)'], edge: ['rgba(245,158,11,0.12)', '#f59e0b', 'rgba(245,158,11,0.2)'] };
      const priColors  = { high: ['rgba(239,68,68,0.12)', '#ef4444', 'rgba(239,68,68,0.2)'], medium: ['rgba(245,158,11,0.12)', '#f59e0b', 'rgba(245,158,11,0.2)'], low: ['rgba(107,114,128,0.12)', '#9ca3af', 'rgba(107,114,128,0.2)'] };
      const [tb, tc2, tbo] = typeColors[tc.type] || typeColors.edge;
      const [pb, pc, pbo] = priColors[tc.priority] || priColors.low;
      return (
        <div className={`tc-card ${open ? 'open' : ''}`}>
          <div className="tc-header" onClick={() => setOpen(!open)}>
            <div className="tc-meta">
              <span className="tc-id">{tc.id}</span>
              <span className="tc-badge" style={{background: tb, color: tc2, border: `1px solid ${tbo}`}}>{tc.type}</span>
              <span className="tc-badge" style={{background: pb, color: pc, border: `1px solid ${pbo}`}}>{tc.priority}</span>
            </div>
            <h4 className="tc-title">{tc.title}</h4>
            <div className={`tc-chevron ${open ? 'rotated' : ''}`}><Icon name="chevron" /></div>
          </div>
          {open && (
            <div className="tc-body">
              {tc.preconditions && <div className="tc-section"><label>Preconditions</label><p>{tc.preconditions}</p></div>}
              <div className="tc-section">
                <label>Steps</label>
                <ol className="tc-steps-list">{tc.steps?.map((s, i) => <li key={i}>{s}</li>)}</ol>
              </div>
              <div className="tc-section"><label>Expected Result</label><p className="expected">{tc.expectedResult}</p></div>
              {tc.tags?.length > 0 && <div className="tc-tags">{tc.tags.map(t => <span key={t} className="tag">{t}</span>)}</div>}
            </div>
          )}
        </div>
      );
    }

    // ── Main App ───────────────────────────────────────────────────
    function App() {
      const [step, setStep] = useState(1);
      const [config, setConfig] = useState({ jiraUrl: '', email: '', apiToken: '', claudeApiKey: '', issueKey: '' });
      const [story, setStory] = useState(null);
      const [testCases, setTestCases] = useState([]);
      const [playwrightScript, setPlaywrightScript] = useState('');
      const [loading, setLoading] = useState({ story: false, testcases: false, playwright: false });
      const [errors, setErrors] = useState({});
      const [copied, setCopied] = useState(false);

      const setErr = (k, m) => setErrors(e => ({ ...e, [k]: m }));
      const clearErr = (k) => setErrors(e => { const n = { ...e }; delete n[k]; return n; });
      const cfg = (k, v) => setConfig(c => ({ ...c, [k]: v }));

      const generateTestCases = useCallback(async (storyData) => {
        clearErr('testcases');
        setLoading(l => ({ ...l, testcases: true }));
        try {
          const res = await fetch(`${API_BASE}/api/ai/testcases`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ claudeApiKey: config.claudeApiKey, story: storyData }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to generate test cases');
          setTestCases(data.testCases || []);
        } catch (e) { setErr('testcases', e.message); }
        finally { setLoading(l => ({ ...l, testcases: false })); }
      }, [config.claudeApiKey]);

      const fetchStory = async () => {
        clearErr('story');
        setLoading(l => ({ ...l, story: true }));
        try {
          const res = await fetch(`${API_BASE}/api/jira/story`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ jiraUrl: config.jiraUrl, email: config.email, apiToken: config.apiToken, issueKey: config.issueKey }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to fetch story');
          setStory(data.story);
          setStep(3);
          await generateTestCases(data.story);
        } catch (e) { setErr('story', e.message); }
        finally { setLoading(l => ({ ...l, story: false })); }
      };

      const generatePlaywright = async () => {
        clearErr('playwright');
        setLoading(l => ({ ...l, playwright: true }));
        try {
          const res = await fetch(`${API_BASE}/api/ai/playwright`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ claudeApiKey: config.claudeApiKey, testCases, story }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to generate Playwright scripts');
          setPlaywrightScript(data.script || '');
          setStep(4);
        } catch (e) { setErr('playwright', e.message); }
        finally { setLoading(l => ({ ...l, playwright: false })); }
      };

      const copyScript = () => {
        navigator.clipboard.writeText(playwrightScript);
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      };

      const downloadScript = () => {
        const blob = new Blob([playwrightScript], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `test_${story?.key?.toLowerCase().replace('-','_') || 'test'}.py`; a.click();
      };

      const reset = () => { setStep(1); setStory(null); setTestCases([]); setPlaywrightScript(''); setErrors({}); };
      const canContinue = config.jiraUrl && config.email && config.apiToken && config.claudeApiKey && config.issueKey;

      return (
        <div className="app">
          <div className="bg-grid" />

          <header className="header">
            <div className="header-inner">
              <div className="logo">
                <div className="logo-icon">{icons.sparkles}</div>
                <div>
                  <h1>TestForge<span className="logo-ai">AI</span></h1>
                  <p>JIRA → Test Cases → Playwright</p>
                </div>
              </div>
              {step > 1 && <button className="btn-ghost" onClick={reset}>← Start Over</button>}
            </div>
          </header>

          <main className="main">
            <Steps current={step} />

            {/* Step 1: Configure */}
            {step === 1 && (
              <div className="card animate-in">
                <div className="card-header">
                  <h2>Configure Connections</h2>
                  <p>Enter your JIRA and Claude API credentials to get started</p>
                </div>
                <div className="form-grid">
                  <div className="form-section">
                    <div className="section-title">{icons.jira} JIRA Configuration</div>
                    <div className="field"><label>JIRA Base URL</label><input type="url" placeholder="https://yourcompany.atlassian.net" value={config.jiraUrl} onChange={e => cfg('jiraUrl', e.target.value)} /></div>
                    <div className="field"><label>Email Address</label><input type="email" placeholder="you@company.com" value={config.email} onChange={e => cfg('email', e.target.value)} /></div>
                    <div className="field">
                      <label>JIRA API Token</label>
                      <input type="password" placeholder="Your JIRA API token" value={config.apiToken} onChange={e => cfg('apiToken', e.target.value)} />
                      <span className="field-hint">Get at: <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank">id.atlassian.com → API tokens</a></span>
                    </div>
                    <div className="field"><label>Issue Key</label><input type="text" placeholder="PROJECT-123" value={config.issueKey} onChange={e => cfg('issueKey', e.target.value.toUpperCase())} /></div>
                  </div>
                  <div className="form-section">
                    <div className="section-title">{icons.sparkles} AI Configuration</div>
                    <div className="field">
                      <label>Claude API Key</label>
                      <input type="password" placeholder="sk-ant-..." value={config.claudeApiKey} onChange={e => cfg('claudeApiKey', e.target.value)} />
                      <span className="field-hint">Get free key at: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></span>
                    </div>
                    <div className="ai-info">
                      <div style={{color:'var(--accent)',flexShrink:0,marginTop:2}}>{icons.sparkles}</div>
                      <div><strong>Powered by Claude Sonnet 4</strong><p>AI generates comprehensive test cases from your story, then converts them to production-ready Playwright TypeScript scripts.</p></div>
                    </div>
                    <div className="pipeline-viz">
                      <div className="pipe-step">{icons.jira}<span>JIRA Story</span></div>
                      <div className="pipe-arrow">→</div>
                      <div className="pipe-step">{icons.sparkles}<span>Test Cases</span></div>
                      <div className="pipe-arrow">→</div>
                      <div className="pipe-step">{icons.code}<span>Playwright</span></div>
                    </div>
                  </div>
                </div>
                <div className="card-footer">
                  <button className="btn-primary" onClick={() => setStep(2)} disabled={!canContinue}>Continue →</button>
                </div>
              </div>
            )}

            {/* Step 2: Fetch */}
            {step === 2 && (
              <div className="card animate-in">
                <div className="card-header">
                  <h2>Fetch JIRA Story</h2>
                  <p>Retrieve <strong>{config.issueKey}</strong> and auto-generate test cases</p>
                </div>
                <div className="issue-preview">
                  <div className="issue-key-badge">{icons.jira} {config.issueKey}</div>
                  <div className="issue-endpoint">{config.jiraUrl}/browse/{config.issueKey}</div>
                </div>
                {errors.story && <div className="error-box">{icons.alert} {errors.story}</div>}
                <div className="card-footer">
                  <button className="btn-ghost" onClick={() => setStep(1)}>← Back</button>
                  <button className="btn-primary" onClick={fetchStory} disabled={loading.story}>
                    {loading.story ? <><span className="spinner" /> Fetching & Generating...</> : 'Fetch & Auto-Generate →'}
                  </button>
                </div>
              </div>
            )}

            {/* Step 3: Story + Test Cases */}
            {step === 3 && story && (
              <div className="animate-in">
                <div className="card story-card">
                  <div className="card-header">
                    <div className="story-header-inner">
                      <span className="issue-badge">{icons.jira} {story.key}</span>
                      <span className="status-badge">{story.status}</span>
                      {story.priority && <span className="priority-badge">{story.priority}</span>}
                    </div>
                    <h2>{story.summary}</h2>
                  </div>
                  {story.description && <div className="story-description"><label>Description</label><p>{story.description}</p></div>}
                </div>

                <div className="card">
                  <div className="card-header between">
                    <div>
                      <h2>{icons.sparkles} Generated Test Cases</h2>
                      <p>{testCases.length} test cases generated by AI</p>
                    </div>
                    {!loading.testcases && testCases.length > 0 && (
                      <button className="btn-primary" onClick={generatePlaywright} disabled={loading.playwright}>
                        {loading.playwright ? <><span className="spinner" /> Generating...</> : <>{icons.code} Generate Playwright →</>}
                      </button>
                    )}
                  </div>
                  {loading.testcases && <div className="loading-state"><div className="loading-orb" /><p>AI is analysing your story and generating test cases...</p></div>}
                  {errors.testcases && <div className="error-box">{icons.alert} {errors.testcases}</div>}
                  {!loading.testcases && testCases.length > 0 && (
                    <div className="tc-grid">{testCases.map((tc, i) => <TestCaseCard key={tc.id || i} tc={tc} />)}</div>
                  )}
                  {errors.playwright && <div className="error-box mt">{icons.alert} {errors.playwright}</div>}
                </div>
              </div>
            )}

            {/* Step 4: Playwright */}
            {step === 4 && playwrightScript && (
              <div className="animate-in">
                <div className="card story-card">
                  <div className="card-header">
                    <div className="story-header-inner">
                      <span className="issue-badge">{icons.jira} {story?.key}</span>
                      <h2>{story?.summary}</h2>
                    </div>
                  </div>
                </div>
                <div className="card">
                  <div className="card-header between">
                    <div>
                      <h2>{icons.code} Playwright Test Script</h2>
                      <p>test_{story?.key?.toLowerCase().replace('-','_')}.py — Python · {testCases.length} test cases</p>
                    </div>
                    <div className="btn-group">
                      <button className="btn-ghost" onClick={() => setStep(3)}>{icons.eye} Test Cases</button>
                      <button className="btn-ghost" onClick={copyScript}>{copied ? <>{icons.check} Copied!</> : <>{icons.copy} Copy</>}</button>
                      <button className="btn-primary" onClick={downloadScript}>{icons.download} Download .ts</button>
                    </div>
                  </div>
                  <div className="code-wrapper">
                    <div className="code-toolbar">
                      <span className="code-lang">Python</span>
                      <span className="code-file">test_{story?.key?.toLowerCase().replace('-','_')}.py</span>
                    </div>
                    <pre className="code-block"><code>{playwrightScript}</code></pre>
                  </div>
                </div>
                <div className="install-guide card">
                  <h3>🚀 Quick Start</h3>
                  <div className="code-snippet"><code>pip install pytest-playwright</code></div>
                  <div className="code-snippet"><code>playwright install chromium</code></div>
                  <div className="code-snippet"><code>pytest test_{story?.key?.toLowerCase().replace('-','_')}.py -v</code></div>
                </div>
              </div>
            )}
          </main>

          <footer className="footer">
            <p>TestForge AI · Built with Claude Sonnet 4 · JIRA REST API v3</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
