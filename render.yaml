services:
  # Backend API Service
  - type: web
    name: testforge-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: static
    name: testforge-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: testforge-backend
          type: web
          property: host
